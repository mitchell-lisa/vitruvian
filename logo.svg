<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" stroke="currentColor" stroke-width="2.8"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="84" stroke="currentColor" stroke-width="2.2"/>
  <!-- Head - small open circle near top of inner circle -->
  <circle cx="100" cy="28" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <!-- Body center line - neck down to hip -->
  <line x1="100" y1="36" x2="100" y2="118" stroke="currentColor" stroke-width="2.5"/>
  <!-- Left arm - wide arc sweeping out and down along the inner circle -->
  <path d="M100 56 C80 48 42 52 24 88" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right arm - wide arc sweeping out and down along the inner circle -->
  <path d="M100 56 C120 48 158 52 176 88" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Left outer leg -->
  <line x1="100" y1="118" x2="68" y2="180" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right outer leg -->
  <line x1="100" y1="118" x2="132" y2="180" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left inner leg (triangle gap) -->
  <line x1="100" y1="118" x2="86" y2="180" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right inner leg (triangle gap) -->
  <line x1="100" y1="118" x2="114" y2="180" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
</svg>
