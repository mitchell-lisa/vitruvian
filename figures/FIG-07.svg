<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg">
  <title>FIG. 7 — Five-Layer Safety Cascade</title>
      <defs>
        <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
        </marker>
      </defs>
      <rect x="40" y="30" width="560" height="40" rx="4" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
      <text x="60" y="54" text-anchor="start" fill="#000" font-size="11" font-weight="700" font-family="Times,serif">L1  </text>
      <text x="110" y="54" text-anchor="start" fill="#000" font-size="10" font-family="Times,serif">Software force ceiling — 100Hz, &lt;10ms response</text>
      <text x="580" y="54" text-anchor="end" fill="#000" font-size="9" font-style="italic" font-family="Times,serif">software</text>
      <rect x="40" y="80" width="560" height="40" rx="4" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
      <text x="60" y="104" text-anchor="start" fill="#000" font-size="11" font-weight="700" font-family="Times,serif">L2  </text>
      <text x="110" y="104" text-anchor="start" fill="#000" font-size="10" font-family="Times,serif">PID compliance on compensation / force spike — &lt;50ms</text>
      <text x="580" y="104" text-anchor="end" fill="#000" font-size="9" font-style="italic" font-family="Times,serif">software</text>
      <rect x="40" y="130" width="560" height="40" rx="4" fill="#ffffff" stroke="#000" stroke-width="2"/>
      <text x="60" y="154" text-anchor="start" fill="#000" font-size="11" font-weight="700" font-family="Times,serif">L3  </text>
      <text x="110" y="154" text-anchor="start" fill="#000" font-size="10" font-family="Times,serif">Slip clutch (36) — mechanical release at 120% F<tspan font-size="7" baseline-shift="sub">max</tspan></text>
      <text x="580" y="154" text-anchor="end" fill="#000" font-size="9" font-style="italic" font-family="Times,serif">mechanical</text>
      <rect x="40" y="180" width="560" height="40" rx="4" fill="#ffffff" stroke="#000" stroke-width="2"/>
      <text x="60" y="204" text-anchor="start" fill="#000" font-size="11" font-weight="700" font-family="Times,serif">L4  </text>
      <text x="110" y="204" text-anchor="start" fill="#000" font-size="10" font-family="Times,serif">E-stop (24) — hardwired NC contactor, cuts motor power</text>
      <text x="580" y="204" text-anchor="end" fill="#000" font-size="9" font-style="italic" font-family="Times,serif">electrical</text>
      <rect x="40" y="230" width="560" height="40" rx="4" fill="#ffffff" stroke="#000" stroke-width="2"/>
      <text x="60" y="254" text-anchor="start" fill="#000" font-size="11" font-weight="700" font-family="Times,serif">L5  </text>
      <text x="110" y="254" text-anchor="start" fill="#000" font-size="10" font-family="Times,serif">Manual quick-release (38) — single-hand, &lt;1s disengage</text>
      <text x="580" y="254" text-anchor="end" fill="#000" font-size="9" font-style="italic" font-family="Times,serif">mechanical</text>
      <line x1="320" y1="70" x2="320" y2="80" stroke="#000" stroke-width="1" marker-end="url(#arr7)"/>
      <line x1="320" y1="120" x2="320" y2="130" stroke="#000" stroke-width="1" marker-end="url(#arr7)"/>
      <line x1="320" y1="170" x2="320" y2="180" stroke="#000" stroke-width="1" marker-end="url(#arr7)"/>
      <line x1="320" y1="220" x2="320" y2="230" stroke="#000" stroke-width="1" marker-end="url(#arr7)"/>
      <text x="320" y="300" text-anchor="middle" fill="#000" font-size="10" font-style="italic" font-family="Times,serif">Five independent layers — failure of one does not compromise the rest.</text>
    </svg>
