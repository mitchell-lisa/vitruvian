<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitruvian — Pilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui.css">
</head>
<body>

<nav class="ui-nav">
  <div class="ui-nav-inner">
    <a href="index.html" class="ui-logo">
      <img src="03d2414f-fd4c-4106-a882-4548fa9c567e.png" alt="">
      <span>VITRUVIAN</span>
    </a>
    <div class="ui-nav-links">
      <a href="index.html" class="ui-nav-link">Home</a>
      <a href="hub.html" class="ui-nav-link">Library</a>
      <a href="pitch.html" class="ui-nav-link">Deck</a>
    </div>
  </div>
</nav>

<main class="ui-page ui-narrow">

  <div class="ui-eyebrow">Pilot</div>
  <h1 class="ui-h1">Tell us if this helps.</h1>
  <p class="ui-sub">3 minutes. We reply in 48 hours.</p>

  <form action="mailto:hello@vitruvian.example" method="post" enctype="text/plain" style="margin-top:36px;">

    <div class="ui-row">
      <div class="ui-field">
        <label class="ui-label" for="name">Name<span class="req">*</span></label>
        <input class="ui-input" type="text" id="name" name="name" required>
      </div>
      <div class="ui-field">
        <label class="ui-label" for="role">Role<span class="req">*</span></label>
        <select class="ui-select" id="role" name="role" required>
          <option value="">Select…</option>
          <option>Athlete</option>
          <option>Coach</option>
          <option>S&amp;C / Performance</option>
          <option>Medical / Physio</option>
          <option>Front Office</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="ui-row">
      <div class="ui-field">
        <label class="ui-label" for="sport">Sport<span class="req">*</span></label>
        <input class="ui-input" type="text" id="sport" name="sport" required>
      </div>
      <div class="ui-field">
        <label class="ui-label" for="org">Team</label>
        <input class="ui-input" type="text" id="org" name="org" placeholder="optional">
      </div>
    </div>

    <div class="ui-field">
      <label class="ui-label" for="pain">What mobility problem do you want fixed?<span class="req">*</span></label>
      <textarea class="ui-textarea" id="pain" name="pain" required></textarea>
    </div>

    <div class="ui-field">
      <label class="ui-label">Pilot?<span class="req">*</span></label>
      <div class="ui-radio-group">
        <label><input type="radio" name="pilot" value="yes" required>Yes</label>
        <label><input type="radio" name="pilot" value="maybe">Maybe</label>
        <label><input type="radio" name="pilot" value="learning">Just looking</label>
      </div>
    </div>

    <div class="ui-row">
      <div class="ui-field">
        <label class="ui-label" for="email">Email<span class="req">*</span></label>
        <input class="ui-input" type="email" id="email" name="email" required>
      </div>
      <div class="ui-field">
        <label class="ui-label" for="phone">Phone</label>
        <input class="ui-input" type="tel" id="phone" name="phone" placeholder="optional">
      </div>
    </div>

    <button type="submit" class="ui-btn ui-btn-primary" style="margin-top:8px;">Send</button>

  </form>

</main>

<footer class="ui-footer">
  <span>Vitruvian · Pilot</span>
  <a href="hub.html">Library</a>
</footer>

</body>
</html>
